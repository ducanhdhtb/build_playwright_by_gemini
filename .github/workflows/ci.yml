# This workflow defines a Continuous Integration process for the Playwright framework

name: Playwright Tests CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This job runs the tests
  run-tests:
    runs-on: ubuntu-latest # Use a Linux runner

    steps:
      # 1. Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Set up JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Cache Maven packages to speed up builds
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 4. Run tests with Maven
      - name: Run tests
        run: mvn clean test

      # 5. Store Allure results
      - name: Store Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 1

  # This job generates and deploys the Allure report to GitHub Pages
  deploy-report:
    # It needs the 'run-tests' job to complete successfully first
    needs: run-tests
    runs-on: ubuntu-latest

    # Grant permissions for the GITHUB_TOKEN to deploy to GitHub Pages
    permissions:
      pages: write
      id-token: write

    steps:
      # 1. Download the Allure results artifact from the previous job
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # 2. Generate the Allure report
      - name: Generate Allure Report
        uses: allure-framework/allure-action@v2 # v2 is still the latest for this action
        with:
          results_path: allure-results
          report_path: allure-report

      # 3. Upload the generated report as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # 4. Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
